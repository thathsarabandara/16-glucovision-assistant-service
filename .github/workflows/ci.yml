name: 16-glucovision-assistant-service CI/CD

on:
  push:
    paths:
      - '16-glucovision-assistant-service/**'
      - '.github/workflows/16-glucovision-assistant-service-ci.yml'
  pull_request:
    paths:
      - '16-glucovision-assistant-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: glucovision/16-glucovision-assistant-service:test
